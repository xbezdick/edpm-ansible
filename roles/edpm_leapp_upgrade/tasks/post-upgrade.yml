# ============================================================================
# Leapp OS Upgrade - Post Upgrade Step
# ============================================================================
- name: Set SELinux back to enforcing after leapp reboot
  ansible.builtin.selinux:
    policy: targeted
    state: enforcing

- name: Run leapp post-reboot command
  ansible.builtin.command:
    cmd: "{{ _leapp_post_reboot_command }}"
  changed_when: true
  when:
    - _leapp_post_reboot_command | length > 0
