#- name: Replace EFI grub.cfg with redirect to /boot/grub2/grub.cfg
#  ansible.builtin.import_tasks: efigrub.yml

- name: Keep nics with prefix from renaming (udev rules)
  ansible.builtin.shell: |
    ip -j link show | \
    jq -r --arg prefix "{{ item }}" '.[] |
      select((.ifname | startswith($prefix)) and
      (.ifname | test("^.*v[0-9]*$") | not) and
      (.ifname | test("^.*_[0-9]*$") | not) and
      (.ifname | test("^.*\\..*$") | not)) |
      if .permaddr? then .address=.permaddr else . end |
      "SUBSYSTEM==\"net\",ACTION==\"add\",DRIVERS==\"?*\",\" + "NAME=\"" + .ifname +"\" ,ATTR{address}==\"" + .address + "\""' >> /etc/udev/rules.d/70-rhosp-persistent-net.rules
  loop: "{{ _leapp_nics_prefixes_to_keep | list }}"
  loop_control:
    label: "{{ item }}"
  when:
    - _leapp_nics_prefixes_to_keep | length > 0

