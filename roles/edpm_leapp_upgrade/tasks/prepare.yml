# ============================================================================
# Leapp OS Upgrade - Prepare Phase
# ============================================================================


- name: Run leapp upgrade init command
  ansible.builtin.command:
    cmd: "{{ _leapp_repo_init_command }}"
  changed_when: true
  when:
    - _leapp_repo_init_command | length > 0

- name: Ensure prerequisite packages are installed
  ansible.builtin.package:
    name:
      - jq
      - lvm2
      - openstack-selinux
      - os-net-config
    state: present

- name: Ensure prerequisite packages are installed
  ansible.builtin.package:
    name: "{{ edpm_leapp_upgrade_base_packages }}"
    state: present
  when:
    - edpm_leapp_upgrade_base_packages | length > 0

#- name: Install leapp-repository-openstack
#  ansible.builtin.package:
#    name: leapp-repository-openstack
#    state: latest

- name: Install leapp-upgrade
  ansible.builtin.package:
    name: leapp-upgrade
    state: latest

- name: Run leapp init command
  ansible.builtin.command:
    cmd: "{{ _leapp_init_command }}"
  changed_when: true
  when:
    - _leapp_init_command | length > 0

- name: Add packages into Leapp's to_remove file
  ansible.builtin.lineinfile:
    path: "/etc/leapp/transaction/to_remove"
    line: "{{ item }}"
  loop: "{{ _leapp_packages_to_remove }}"
  loop_control:
    label: "{{ item }}"
  when:
    - _leapp_packages_to_remove | length > 0

- name: Add packages into Leapp's to_install file
  ansible.builtin.lineinfile:
    path: "/etc/leapp/transaction/to_install"
    line: "{{ item }}"
  loop: "{{ _leapp_packages_to_install }}"
  loop_control:
    label: "{{ item }}"
  when:
    - _leapp_packages_to_install | length > 0

